[defaults]
inventory          = inventory/hosts.yml
remote_user        = ubuntu
private_key_file   = ~/.ssh/devsecops
host_key_checking  = False
roles_path         = roles
retry_files_enabled = False
stdout_callback    = default
result_format      = yaml
interpreter_python = /usr/bin/python3

[privilege_escalation]
become      = True
become_method = sudo
become_user = root
