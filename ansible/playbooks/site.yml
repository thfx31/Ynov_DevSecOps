---
# Déploiement complet from scratch - à lancer après terraform apply.
# Prérequis : VMs joignables (10.0.0.10/11/20/21), clé SSH ~/.ssh/devsecops en place.
# Pour redéployer un seul bloc : ansible-playbook playbooks/vault.yml (ou spire.yml, boundary.yml).

- name: Common baseline (NTP, timezone)
  ansible.builtin.import_playbook: common.yml
- name: Deploy Vault
  ansible.builtin.import_playbook: vault.yml
- name: Deploy SPIRE
  ansible.builtin.import_playbook: spire.yml
- name: Deploy Boundary
  ansible.builtin.import_playbook: boundary.yml
