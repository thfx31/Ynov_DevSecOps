---
- name: Create Vault directories
  ansible.builtin.file:

    path: "{{ item.path }}"
    state: directory
    owner: vault
    group: vault
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vault_data_dir }}", mode: "0700" }
    - { path: "{{ vault_log_dir }}", mode: "0755" }
    - { path: "{{ vault_config_dir }}", mode: "0755" }

- name: Deploy Vault configuration
  ansible.builtin.template:

    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: vault
    group: vault
    mode: "0640"
  notify: restart vault

- name: Set VAULT_ADDR in /etc/environment
  ansible.builtin.lineinfile:

    path: /etc/environment
    regexp: '^VAULT_ADDR='
    line: 'VAULT_ADDR=http://10.0.0.10:8200'

- name: Allow Vault API port (8200) from internal network
  community.general.ufw:

    rule: allow
    from_ip: "10.0.0.0/24"
    to_port: "8200"
    proto: tcp
    comment: "Vault API"

- name: Enable and start Vault
  ansible.builtin.systemd:

    name: vault
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Vault to be ready
  uri:
    url: "{{ vault_addr }}/v1/sys/health"
    status_code: [200, 429, 472, 473, 501, 503]
    validate_certs: false
  register: vault_health
  retries: 10
  delay: 3
  until: vault_health.status in [200, 429, 472, 473, 501, 503]
