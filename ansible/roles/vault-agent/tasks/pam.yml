---
# Permettre l'auth par challenge-response (nécessaire pour OTP)
- name: Enable KbdInteractiveAuthentication in sshd_config
  ansible.builtin.lineinfile:

    path: /etc/ssh/sshd_config
    regexp: '^#?KbdInteractiveAuthentication'
    line: 'KbdInteractiveAuthentication yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Ensure UsePAM is enabled
  ansible.builtin.lineinfile:

    path: /etc/ssh/sshd_config
    regexp: '^#?UsePAM'
    line: 'UsePAM yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

# Remplace @include common-auth par pam_exec (vault-ssh-helper) + pam_unix fallback
- name: Configure PAM sshd for vault-ssh-helper
  ansible.builtin.blockinfile:

    path: /etc/pam.d/sshd
    insertbefore: '^@include common-auth'
    marker: "# {mark} VAULT-SSH-HELPER"
    block: |
      auth requisite pam_exec.so quiet expose_authtok log={{ vault_ssh_helper_log }} {{ vault_ssh_helper_bin }} -dev -config={{ vault_ssh_helper_config_dir }}/config.hcl
      auth optional pam_unix.so not_set_pass use_first_pass nodelay

- name: Comment out @include common-auth (replaced by vault-ssh-helper)
  ansible.builtin.replace:
    path: /etc/pam.d/sshd
    regexp: '^(@include common-auth)$'
    replace: '# \1 - disabled: vault-ssh-helper handles auth'

- name: Create vault-ssh log file
  ansible.builtin.file:

    path: "{{ vault_ssh_helper_log }}"
    state: touch
    mode: "0640"
    owner: root
    group: adm
    modification_time: preserve
    access_time: preserve
