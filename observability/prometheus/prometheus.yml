global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # Vault - unauthenticated_metrics_access activé dans vault.hcl
  - job_name: 'vault'
    metrics_path: /v1/sys/metrics
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['10.0.0.10:8200']

  # SPIRE Server - telemetry Prometheus (port 8088, activé dans server.conf)
  - job_name: 'spire-server'
    static_configs:
      - targets: ['10.0.0.11:8088']

  # SPIRE Agents - workload-a et workload-b
  - job_name: 'spire-agent'
    static_configs:
      - targets:
          - '10.0.0.20:8088'
          - '10.0.0.21:8088'
