global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # Vault - token read-only dédié (prometheus-metrics policy, TTL 1 an)
  # Token généré par Ansible dans observability/prometheus/.vault-token (gitignored)
  - job_name: 'vault'
    metrics_path: /v1/sys/metrics
    params:
      format: ['prometheus']
    bearer_token_file: /etc/prometheus/.vault-token
    static_configs:
      - targets: ['10.0.0.10:8200']

  # SPIRE Server - telemetry Prometheus (port 8088, activé dans server.conf)
  - job_name: 'spire-server'
    static_configs:
      - targets: ['10.0.0.11:8088']

  # SPIRE Agents - workload-a et workload-b
  - job_name: 'spire-agent'
    static_configs:
      - targets:
          - '10.0.0.20:8088'
          - '10.0.0.21:8088'
